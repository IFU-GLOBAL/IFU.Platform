version: 1
applications:
  - appRoot: ifu-app
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - printf "DATABASE_URL=%s\n" "$DATABASE_URL" >> .env.production
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
