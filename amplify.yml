version: 1
applications:
  - appRoot: ifu-static-site
    frontend:
      phases:
        build:
          commands:
            - echo "No build required"
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
version: 1
applications:
  - appRoot: ifu-app
    frontend:
      phases:
        preBuild:
          commands:
            - npm install
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*