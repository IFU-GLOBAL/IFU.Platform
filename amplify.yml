version: 1
applications:
  - appRoot: ifu-app
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - printf "DATABASE_URL=%s\n" "$DATABASE_URL" >> .env.production
            - printf "APP_BASE_URL=%s\n" "$APP_BASE_URL" >> .env.production
            - printf "AUTH_SESSION_SECRET=%s\n" "$AUTH_SESSION_SECRET" >> .env.production
            - printf "COGNITO_REGION=%s\n" "$COGNITO_REGION" >> .env.production
            - printf "COGNITO_USER_POOL_ID=%s\n" "$COGNITO_USER_POOL_ID" >> .env.production
            - printf "COGNITO_CLIENT_ID=%s\n" "$COGNITO_CLIENT_ID" >> .env.production
            - printf "COGNITO_CLIENT_SECRET=%s\n" "$COGNITO_CLIENT_SECRET" >> .env.production
            - printf "COGNITO_DOMAIN=%s\n" "$COGNITO_DOMAIN" >> .env.production
            - printf "COGNITO_REDIRECT_URI=%s\n" "$COGNITO_REDIRECT_URI" >> .env.production
            - printf "COGNITO_LOGOUT_URI=%s\n" "$COGNITO_LOGOUT_URI" >> .env.production
            - printf "COGNITO_SCOPES=%s\n" "$COGNITO_SCOPES" >> .env.production
            - printf "SES_REGION=%s\n" "$SES_REGION" >> .env.production
            - printf "SES_FROM_EMAIL=%s\n" "$SES_FROM_EMAIL" >> .env.production
            - printf "SES_REPLY_TO_EMAIL=%s\n" "$SES_REPLY_TO_EMAIL" >> .env.production
            - printf "MAINTENANCE_SECRET=%s\n" "$MAINTENANCE_SECRET" >> .env.production
            - printf "CRON_SECRET=%s\n" "$CRON_SECRET" >> .env.production
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
